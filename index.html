<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="JLU Course 2024 在线课程资料阅读站" />
  <title>JLU Course 2024</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css" />
  <style>
    :root {
      --theme-color: #1f7a8c;
      --content-max-width: 980px;
      --toc-width: 220px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }

    .markdown-section {
      max-width: var(--content-max-width);
    }

    @media (min-width: 1360px) {
      .content {
        right: var(--toc-width);
      }
    }

    .markdown-section pre,
    .markdown-section table {
      border-radius: 6px;
    }

    .sidebar ul li a {
      line-height: 1.65;
    }

    .app-name-link img {
      max-width: 120px;
    }

    .page-toc {
      position: fixed;
      top: 116px;
      right: 24px;
      width: var(--toc-width);
      max-height: calc(100vh - 150px);
      overflow: auto;
      padding-left: 18px;
      border-left: 1px solid #e5e7eb;
      color: #53636f;
      font-size: 13px;
      line-height: 1.45;
    }

    .page-toc-title {
      margin-bottom: 10px;
      color: #263745;
      font-weight: 700;
    }

    .page-toc a {
      display: block;
      padding: 4px 0;
      color: #53636f;
      text-decoration: none;
    }

    .page-toc a:hover {
      color: var(--theme-color);
    }

    .page-toc-level-3 {
      padding-left: 12px !important;
    }

    @media (max-width: 1359px) {
      .page-toc {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">正在加载课程资料...</div>
  <script>
    window.__DOCS_VERSION__ = '2026-06-26-mathfix';

    (function() {
      var originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url) {
        if (method && method.toUpperCase() === 'GET' && typeof url === 'string') {
          var cleanUrl = url.split('#')[0].split('?')[0];
          var shouldBustCache = /(?:^|\/)(?:README|_sidebar|[^/]+)\.md$/.test(cleanUrl);
          if (shouldBustCache) {
            var separator = url.indexOf('?') === -1 ? '?' : '&';
            url += separator + 'v=' + encodeURIComponent(window.__DOCS_VERSION__);
          }
        }
        return originalOpen.apply(this, arguments.length > 2 ? [method, url].concat(Array.prototype.slice.call(arguments, 2)) : [method, url]);
      };
    })();

    window.$docsify = {
      name: 'JLU Course 2024',
      repo: 'goya4140/JLU_Course_2024',
      homepage: 'README.md',
      basePath: window.location.pathname.endsWith('/')
        ? window.location.pathname
        : window.location.pathname.replace(/\/[^/]*$/, '/'),
      loadSidebar: '_sidebar.md',
      subMaxLevel: 0,
      sidebarDisplayLevel: 1,
      auto2top: true,
      relativePath: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索课程资料',
        noData: '没有找到相关内容',
        depth: 4,
        hideOtherSidebarContent: false
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      },
      pagination: {
        previousText: '上一页',
        nextText: '下一页',
        crossChapter: true,
        crossChapterText: true
      },
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            var route = window.location.hash.replace(/^#\/?/, '').split(/[?#]/)[0];
            var base = route.includes('/') ? route.slice(0, route.lastIndexOf('/') + 1) : '';
            document.querySelectorAll('.markdown-section img').forEach(function(img) {
              var src = img.getAttribute('src') || '';
              if (!src || /^(https?:|data:|\/|#)/.test(src) || src.startsWith(base)) {
                return;
              }
              img.setAttribute('src', base + src);
            });

            function normalizeMathText(root) {
              if (!root) {
                return;
              }
              var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
                acceptNode: function(node) {
                  var parent = node.parentElement;
                  if (!parent || parent.closest('pre, code, script, style, .katex')) {
                    return NodeFilter.FILTER_REJECT;
                  }
                  return /\\(?:left|right)[{}]/.test(node.nodeValue || '')
                    ? NodeFilter.FILTER_ACCEPT
                    : NodeFilter.FILTER_SKIP;
                }
              });

              var nodes = [];
              while (walker.nextNode()) {
                nodes.push(walker.currentNode);
              }

              nodes.forEach(function(node) {
                node.nodeValue = node.nodeValue
                  .replace(/\\left\{/g, '\\left\\{')
                  .replace(/\\right\}/g, '\\right\\}')
                  .replace(/\\left\}/g, '\\left\\}')
                  .replace(/\\right\{/g, '\\right\\{');
              });
            }

            function renderLooseInlineMath(root) {
              if (!root || !window.katex) {
                return;
              }

              var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
                acceptNode: function(node) {
                  var parent = node.parentElement;
                  if (!parent || parent.closest('pre, code, script, style, .katex')) {
                    return NodeFilter.FILTER_REJECT;
                  }
                  var text = node.nodeValue || '';
                  return /\$[^$\n]+\$/.test(text)
                    ? NodeFilter.FILTER_ACCEPT
                    : NodeFilter.FILTER_SKIP;
                }
              });

              var nodes = [];
              while (walker.nextNode()) {
                nodes.push(walker.currentNode);
              }

              nodes.forEach(function(node) {
                var text = node.nodeValue || '';
                var fragment = document.createDocumentFragment();
                var cursor = 0;
                var changed = false;
                var pattern = /\$([^$\n]+)\$/g;
                var match;

                while ((match = pattern.exec(text)) !== null) {
                  var formula = match[1].trim();
                  if (!formula) {
                    continue;
                  }

                  fragment.appendChild(document.createTextNode(text.slice(cursor, match.index)));
                  try {
                    var span = document.createElement('span');
                    span.innerHTML = window.katex.renderToString(formula, {
                      displayMode: false,
                      throwOnError: false
                    });
                    fragment.appendChild(span);
                    changed = true;
                  } catch (error) {
                    fragment.appendChild(document.createTextNode(match[0]));
                  }
                  cursor = match.index + match[0].length;
                }

                if (changed) {
                  fragment.appendChild(document.createTextNode(text.slice(cursor)));
                  node.parentNode.replaceChild(fragment, node);
                }
              });
            }

            var article = document.querySelector('.markdown-section');
            normalizeMathText(article);

            if (window.renderMathInElement) {
              window.renderMathInElement(article, {
                delimiters: [
                  { left: '$$', right: '$$', display: true },
                  { left: '$', right: '$', display: false },
                  { left: '\\\\(', right: '\\\\)', display: false },
                  { left: '\\\\[', right: '\\\\]', display: true }
                ],
                throwOnError: false
              });
            }
            renderLooseInlineMath(article);

            var oldToc = document.querySelector('.page-toc');
            if (oldToc) {
              oldToc.remove();
            }

            var headings = Array.from(document.querySelectorAll('.markdown-section h2, .markdown-section h3'))
              .filter(function(heading) {
                return heading.id && heading.textContent.trim();
              })
              .slice(0, 24);

            if (headings.length > 1) {
              var toc = document.createElement('nav');
              toc.className = 'page-toc';
              toc.setAttribute('aria-label', '本文目录');
              var title = document.createElement('div');
              title.className = 'page-toc-title';
              title.textContent = '本文目录';
              toc.appendChild(title);

              var pageHash = window.location.hash.split('?')[0] || '#/';
              headings.forEach(function(heading) {
                var link = document.createElement('a');
                var level = heading.tagName === 'H3' ? 3 : 2;
                link.className = 'page-toc-level-' + level;
                link.href = pageHash + '?id=' + encodeURIComponent(heading.id);
                link.textContent = heading.textContent.replace(/^#\s*/, '').trim();
                toc.appendChild(link);
              });

              document.body.appendChild(toc);
            }
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
