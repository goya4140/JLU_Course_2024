<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="JLU Course 2024 在线课程资料阅读站" />
  <title>JLU Course 2024</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css" />
  <style>
    :root {
      --theme-color: #1f7a8c;
      --content-max-width: 980px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }

    .markdown-section {
      max-width: var(--content-max-width);
    }

    .markdown-section pre,
    .markdown-section table {
      border-radius: 6px;
    }

    .sidebar ul li a {
      line-height: 1.65;
    }

    .app-name-link img {
      max-width: 120px;
    }
  </style>
</head>
<body>
  <div id="app">正在加载课程资料...</div>
  <script>
    window.$docsify = {
      name: 'JLU Course 2024',
      repo: 'goya4140/JLU_Course_2024',
      homepage: 'README.md',
      basePath: window.location.pathname.endsWith('/')
        ? window.location.pathname
        : window.location.pathname.replace(/\/[^/]*$/, '/'),
      loadSidebar: '_sidebar.md',
      subMaxLevel: 3,
      auto2top: true,
      relativePath: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索课程资料',
        noData: '没有找到相关内容',
        depth: 4,
        hideOtherSidebarContent: false
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      },
      pagination: {
        previousText: '上一页',
        nextText: '下一页',
        crossChapter: true,
        crossChapterText: true
      },
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            var route = window.location.hash.replace(/^#\/?/, '').split(/[?#]/)[0];
            var base = route.includes('/') ? route.slice(0, route.lastIndexOf('/') + 1) : '';
            document.querySelectorAll('.markdown-section img').forEach(function(img) {
              var src = img.getAttribute('src') || '';
              if (!src || /^(https?:|data:|\/|#)/.test(src) || src.startsWith(base)) {
                return;
              }
              img.setAttribute('src', base + src);
            });

            if (window.renderMathInElement) {
              window.renderMathInElement(document.querySelector('.markdown-section'), {
                delimiters: [
                  { left: '$$', right: '$$', display: true },
                  { left: '$', right: '$', display: false },
                  { left: '\\\\(', right: '\\\\)', display: false },
                  { left: '\\\\[', right: '\\\\]', display: true }
                ],
                throwOnError: false
              });
            }
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
